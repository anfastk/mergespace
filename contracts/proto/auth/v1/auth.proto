syntax = "proto3";

package auth.v1;

option go_package = "github.com/anfastk/mergespace/contracts/gen/go/proto/auth/v1;authv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

message InitiateSignupRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string password = 4;
  string username = 5;
}

message InitiateSignupResponse {
  string message = 1;
  string temp_id = 2; 
}

message CheckUsernameRequest {
  string username = 1;
}

message CheckUsernameResponse {
  bool available = 1;
  string message = 2;
  repeated string suggestions = 3;
}

message VerifySignupRequest {
  string temp_id = 1; 
  string otp = 2;
}

message UserRes {
  string id = 1;
  string username = 2;
  string email = 3;
  string avatar = 4;
  string status = 5;
}

message AuthResponse {
  UserRes user = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp access_expires_at = 4;
}

message ResendOTPRequest {
  string temp_id = 1;
}

message LoginRequest {
  string email_or_username = 1;
  string password = 2;
}

message ForgotPasswordRequest {
  string email_or_username = 1;
}

message ResendForgotPasswordOTPRequest {
  string reset_id = 1;
}

message VerifyForgotPasswordOTPRequest {
  string reset_id = 1;
  string otp = 2;
}

message ResetPasswordRequest {
  string reset_id = 1;
  string new_password = 2;
}

message LogoutRequest {}

message LogoutResponse {
  string message = 1;
}

service AuthService {
  rpc CheckUsernameAvailability(CheckUsernameRequest) returns (CheckUsernameResponse);

  rpc InitiateSignup(InitiateSignupRequest) returns (InitiateSignupResponse);

  rpc VerifySignup(VerifySignupRequest) returns (AuthResponse);
  rpc ResendOTP(ResendOTPRequest) returns (InitiateSignupResponse);

  rpc Login(LoginRequest) returns (AuthResponse);

  rpc ForgotPassword(ForgotPasswordRequest) returns (InitiateSignupResponse);
  rpc ResendForgotPasswordOTP(ResendForgotPasswordOTPRequest) returns (InitiateSignupResponse);
  rpc VerifyForgotPasswordOTP(VerifyForgotPasswordOTPRequest) returns (google.protobuf.Empty);
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty);
  rpc RefreshToken(google.protobuf.Empty) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);

}