syntax = "proto3";

package auth.v1;

option go_package = "github.com/anfastk/mergespace/contracts/gen/go/proto/auth/v1;authv1";

import "google/protobuf/timestamp.proto";

message InitiateSignupRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string password = 4;
  string username = 5;
}

message InitiateSignupResponse {
  string message = 1;
  string temp_id = 2; 
}

message CheckUsernameRequest {
  string username = 1;
}

message CheckUsernameResponse {
  bool available = 1;
  string message = 2;
  repeated string suggestions = 3;
}

message VerifySignupRequest {
  string temp_id = 1; 
  string otp = 2;
}

message UserRes {
  string id = 1;
  string username = 2;
  string email = 3;
  string avatar = 4;
  string status = 5;
}

message VerifySignupResponse {
  UserRes user = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp access_expires_at = 4;
}

message ResendOTPRequest {
  string temp_id = 1;
}

service AuthService {
  rpc InitiateSignup(InitiateSignupRequest) returns (InitiateSignupResponse);

  rpc CheckUsernameAvailability(CheckUsernameRequest) returns (CheckUsernameResponse);

  rpc VerifySignup(VerifySignupRequest) returns (VerifySignupResponse);

  rpc ResendOTP(ResendOTPRequest) returns (InitiateSignupResponse);

}